<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Calculadora de Quebra de Carga</title>
<link rel="stylesheet" href="index.css">
</head>

<body>

<div class="container">

<h1>Calculadora de Quebra de Carga</h1>

<form id="formulario">
  <label>Peso da Nota (kg)</label>
  <input type="number" id="pesoNota">

  <label>Peso Final (kg)</label>
  <input type="number" id="pesoFinal">

  <button type="button" onclick="calcular()">Calcular</button>
  <button type="button" onclick="reiniciar()">Reiniciar</button>
</form>

<p id="resultado"></p>

</div>

<script src="index.js"></script>

</body>
